<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دياكود - Diacode</title>
    <link rel="json" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 0; }
        nav { background: #007bff; color: white; padding: 1rem; font-size: 1.5rem; font-weight: bold; }
        .container { padding: 20px; }
        .post-box { background: white; border-radius: 10px; padding: 15px; margin: 10px auto; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav>دياكود - Diacode</nav>

    <div class="container">
        <div class="post-box">
            <p>مرحباً بك في دياكود! ابدأ بمشاركة أفكارك هنا.</p>
        </div>
    </div>

    <script>
        // كود تسجيل الـ Service Worker لتشغيل الموقع كتطبيق
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
            .then(() => console.log("Diacode App Ready!"))
            .catch((err) => console.log("Error:", err));
        }
    </script>
</body>
</html>
